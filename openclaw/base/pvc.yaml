apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-nfs
  namespace: openclaw
  labels:
    app: openclaw
  annotations:
    argocd.argoproj.io/sync-options: Delete=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-longhorn
  namespace: openclaw
  labels:
    app: openclaw
  annotations:
    argocd.argoproj.io/sync-options: Delete=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi