apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-device-plugin
  namespace: argocd
spec:
  project: infrastructure
  source:
    chart: nvidia-device-plugin
    repoURL: https://nvidia.github.io/k8s-device-plugin
    targetRevision: 0.17.1
    helm:
      values: |
        runtimeClassName: nvidia
        deviceDiscoveryStrategy: nvml

        nodeSelector:
          node-role.kubernetes.io/ai: "true"

        tolerations:
          - key: nvidia.com/gpu
            operator: Equal
            value: "true"
            effect: NoSchedule

        gfd:
          enabled: true
          nodeSelector:
            node-role.kubernetes.io/ai: "true"
          tolerations:
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule

        nfd:
          master:
            nodeSelector:
              node-role.kubernetes.io/ai: "true"
            tolerations:
              - key: nvidia.com/gpu
                operator: Equal
                value: "true"
                effect: NoSchedule
          worker:
            nodeSelector:
              node-role.kubernetes.io/ai: "true"
            tolerations:
              - key: nvidia.com/gpu
                operator: Equal
                value: "true"
                effect: NoSchedule
          gc:
            nodeSelector:
              node-role.kubernetes.io/ai: "true"
          topologyUpdater:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: nvidia-device-plugin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true