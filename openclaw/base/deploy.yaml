apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          ports:
            - containerPort: 18789
          envFrom:
            - configMapRef:
                name: openclaw-config
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              memory: 2Gi
              cpu: 2000m      
            requests:
              memory: 1.5Gi
              cpu: 500m
            livenessProbe:
              httpGet:
                path: /health
                port: 18789
              initialDelaySeconds: 60
              periodSeconds: 15
              failureThreshold: 3
            readinessProbe:
              httpGet:
                path: /health
                port: 18789
              initialDelaySeconds: 60
              periodSeconds: 15                
            statrtupProbe:
              httpGet:
                path: /health
                port: 18789 
              initialDelaySeconds: 60
              periodSeconds: 30
              successThreshold: 1
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/node/.openclaw
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
      volumes:
        - name: tmp
          emptyDir: {}
        - name: home
          emptyDir: {}