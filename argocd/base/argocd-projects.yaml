  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  orphanedResources:
    warn: true
    ignore:
      - group: ""
        kind: Secret
        name: tls-certificate
      - group: ""
        kind: Secret
