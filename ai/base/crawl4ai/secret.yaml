# ── Optional: only needed if using LLM-driven extraction ──────────────────
# Replace <base64-encoded-key> with:  echo -n "sk-..." | base64
#
# Then uncomment the env block in 01-deployment.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: crawl4ai-secrets
  namespace: ai
type: Opaque
data:
  openai-api-key: <base64-encoded-key>