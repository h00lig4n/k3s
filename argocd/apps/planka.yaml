apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: planka
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
  project: applications
  sources:
  - repoURL: https://github.com/h00lig4n/k3s-private.git
    targetRevision: HEAD
    path: planka/overlays/prod
  - chart: planka
    repoURL: http://plankanban.github.io/planka
    targetRevision: 2.0.x
    helm:
      valueFiles:
        - $values/planka/helm/values.yaml
        - $values-private/planka/helm/values.yaml
  - repoURL: https://github.com/h00lig4n/k3s.git
    targetRevision: HEAD
    ref: values
  - repoURL: https://github.com/h00lig4n/k3s-private.git
    targetRevision: HEAD
    ref: values-private