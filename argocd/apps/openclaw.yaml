apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw
  namespace: argocd
  labels:
    image-policy: semver
spec:
  destination:
    namespace: openclaw
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
  project: applications
  sources:
    - repoURL: https://github.com/h00lig4n/k3s-private.git
      targetRevision: HEAD
      path: openclaw/overlays/prod
