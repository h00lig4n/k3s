apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  labels:
    app: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "auth": {
          "mode": "token"
        },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["https://claw.home.thomason.nu"]
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace"
        },
        "list": [
          {
            "id": "general",
            "name": "General (Qwen 3.5 9B)",
            "workspace": "~/.openclaw/workspace",
            "model": "ollama/qwen3.5:9b",
            "env": {
              "OLLAMA_HOST": "http://ollama.ai.svc.cluster.local:11434"
            }
          },
          {
            "id": "reasoning",
            "name": "Reasoning (DeepSeek R1 8B)",
            "workspace": "~/.openclaw/workspace",
            "model": "ollama/deepseek-r1:8b",
            "env": {
              "OLLAMA_HOST": "http://ollama.ai.svc.cluster.local:11434"
            }
          },
          {
            "id": "coding",
            "name": "Coding (Qwen 2.5 Coder 7B)",
            "workspace": "~/.openclaw/workspace",
            "model": "ollama/qwen2.5-coder:7b",
            "env": {
              "OLLAMA_HOST": "http://ollama.ai.svc.cluster.local:11434"
            }
          },
          {
            "id": "vision",
            "name": "Vision (LLaVA 7B)",
            "workspace": "~/.openclaw/workspace",
            "model": "ollama/llava:7b",
            "env": {
              "OLLAMA_HOST": "http://ollama.ai.svc.cluster.local:11434"
            }
          },
          {
            "id": "fast",
            "name": "Fast (Llama 3.2 3B)",
            "workspace": "~/.openclaw/workspace",
            "model": "ollama/llama3.2:3b",
            "env": {
              "OLLAMA_HOST": "http://ollama.ai.svc.cluster.local:11434"
            }
          }
        ]
      },
      "cron": { "enabled": false }
    }
  AGENTS.md: |
    # OpenClaw Assistant

    You are a helpful AI assistant running in Kubernetes.