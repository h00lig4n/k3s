apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: casdoor
  namespace: argocd
  labels:
    image-policy: semver
spec:
  destination:
    namespace: auth
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
  project: appplications
  sources:
    - path: auth/casdoor/overlays/prod
      repoURL: https://github.com/h00lig4n/k3s-private.git
      targetRevision: HEAD