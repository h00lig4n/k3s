config:
  clientID: "YOUR_CLIENT_ID"
  clientSecret: "YOUR_CLIENT_SECRET"
  cookieSecret: "YOUR_COOKIE_SECRET"

  configFile: |
    provider = "oidc"
    oidc_issuer_url = "https://auth.mydomain.com"
    email_domains = ["*"]

    redirect_url = "https://oauth.mydomain.com/oauth2/callback"
    oidc_groups_claim = "roles"
    upstreams = ["static://200"]

    cookie_domains = [".mydomain.com"]
    cookie_samesite = "lax"
    whitelist_domains = [".mydomain.com"]

    scope = "openid profile email"

extraArgs:
  set-xauthrequest: "true"
  reverse-proxy: "true"
  skip-provider-button: "true"

revisionHistoryLimit: 2

resources:
  limits:
    cpu: 100m
    memory: 300Mi
  requests:
    cpu: 50m
    memory: 100Mi


ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd,auth-oauth-headers@kubernetescrd
  hosts:
    - oauth.mydomain.com
  path: /
  pathType: Prefix
  tls:
    - hosts:
        - oauth.mydomain.com