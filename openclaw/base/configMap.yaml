apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  labels:
    app: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "auth": {
          "mode": "token"
        },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["https://claw.mydomain.com"]
        }
      },
      "models": {
        "providers": {
          "ollama": {
            "apiKey": "ollama-local",
            "baseUrl": "http://ollama.ai.svc.cluster.local:11434",
            "api": "ollama"
          }
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace",
          "model": {
            "primary": "ollama/qwen3.5:9b",
            "fallbacks": ["ollama/qwen2.5:7b-instruct-q4_K_M"]
          }
        },
      },
      "cron": { "enabled": false }
    }
  AGENTS.md: |
    # OpenClaw Assistant

    You are a helpful AI assistant running in Kubernetes.