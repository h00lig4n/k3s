apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-policy
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
  project: infrastructure
  sources:
    - repoURL: https://github.com/h00lig4n/k3s.git
      targetRevision: HEAD
      path: network/base