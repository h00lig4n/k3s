apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: influxdb
  namespace: hass
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`influxdb.mydomain.com`) && Headers(`X-Auth-Request-Groups`, `admin`) && PathPrefix(`/api/v2`)
      kind: Rule
      middlewares:
        - name: casdoor-auth
          namespace: auth
        - name: influx-admin-token
      services:
        - name: whoami
          port: 80
    - match: Host(`influxdb.mydomain.com`) && PathPrefix(`/api/v2`)
      kind: Rule
      middlewares:
        - name: casdoor-auth
          namespace: auth
        - name: influx-read-token
      services:
        - name: whoami
          port: 80
  tls: {}
