apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawl4ai
  namespace: ai
  labels:
    app: crawl4ai
    app.kubernetes.io/component: crawler
    app.kubernetes.io/name: crawl4ai
    app.kubernetes.io/part-of: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crawl4ai
  template:
    metadata:
      labels:
        app: crawl4ai
    spec:
      # Crawl4AI runs Chromium — it needs a real /dev/shm
      # On Kubernetes we emulate --shm-size=1g via an emptyDir volume
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: crawl4ai-config
          configMap:
            name: crawl4ai-config
            optional: true          # remove this line if you apply the ConfigMap below
      containers:
        - name: crawl4ai
          image: unclecode/crawl4ai:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 11235
              protocol: TCP

          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: crawl4ai-config
              mountPath: /app/config.yml
              subPath: config.yml
              readOnly: true

          # Optional: pass an LLM API key for LLM-driven extraction
          # env:
          #   - name: OPENAI_API_KEY
          #     valueFrom:
          #       secretKeyRef:
          #         name: crawl4ai-secrets
          #         key: openai-api-key

          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

      # Chromium won't start without these security settings
      securityContext:
        runAsNonRoot: false    # Playwright requires root or specific caps
      
      # Tolerate nodes that might be tainted for browser workloads
      # tolerations:
      #   - key: "browser-workload"
      #     operator: "Equal"
      #     value: "true"
      #     effect: "NoSchedule"
