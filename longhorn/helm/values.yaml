preUpgradeChecker:
  jobEnabled: false

global:
  revisionHistoryLimit: 2
  nodeSelector:
    longhorn-storage: "true"

defaultSettings:
  defaultReplicaCount: 3
  defaultDataPath: /mnt/usb/longhorn
  createDefaultDiskLabeledNodes: true
  disableSchedulingOnCordonedNode: true

longhornManager:
  nodeSelector:
    longhorn-storage: "true"

longhornDriver:
  nodeSelector:
    longhorn-storage: "true"

longhornUI:
  nodeSelector:
    longhorn-storage: "true"

ingress:
  enabled: true
  ingressClassName: traefik
  host: longhorn.example.com
  tls: true
  tlsSecret: tls-certificate
