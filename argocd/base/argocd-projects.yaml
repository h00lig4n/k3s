apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infrastructure
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Infrastructure Items
  sourceRepos:
  - '*'
  destinations:
  - namespace: '*'
    server: '*'
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  orphanedResources:
    warn: true
    ignore:
      - group: ""
        kind: Secret
        name: tls-certificate
      - group: ""
        kind: Secret
        name: tls-staging-certificate
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
